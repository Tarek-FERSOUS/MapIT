upstream mapit_web_upstream {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name mapit.company.com;

    # Redirect plain HTTP to HTTPS in production.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mapit.company.com;

    # Replace with your real certificate paths.
    ssl_certificate /etc/letsencrypt/live/mapit.company.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mapit.company.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 25m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket/upgrade requests
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_pass http://mapit_web_upstream;
    }
}
